<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SafeRoute Admin{% endblock %}</title>
  {% block extra_head %}{% endblock %}
  <style>
    :root {
      color-scheme: light;
      --ink: #17211c;
      --muted: #637068;
      --line: #dfe7e1;
      --soft: #f5f8f6;
      --panel: #ffffff;
      --accent: #0f7a5a;
      --accent-2: #335c99;
      --warn: #b45309;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--soft);
    }
    a { color: inherit; text-decoration: none; }
    .shell { min-height: 100vh; display: grid; grid-template-columns: 248px minmax(0, 1fr); }
    .sidebar {
      background: #10231d;
      color: #eef8f2;
      padding: 24px 18px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .brand { display: flex; flex-direction: column; gap: 4px; padding: 0 8px; }
    .brand strong { font-size: 22px; letter-spacing: 0; }
    .brand span { color: #a9c5b8; font-size: 13px; }
    .nav { display: grid; gap: 6px; }
    .nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 8px;
      color: #cfe1d7;
      font-weight: 650;
      font-size: 14px;
    }
    .nav a.active, .nav a:hover { background: #1f3b31; color: #fff; }
    .main { padding: 24px; min-width: 0; }
    .auth-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(15, 122, 90, 0.13), transparent 34%),
        linear-gradient(135deg, #eef6f2 0%, #f7faf8 52%, #edf3f8 100%);
    }
    .auth-card {
      width: min(100%, 420px);
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(223, 231, 225, 0.9);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 20px 48px rgba(25, 44, 35, 0.13);
    }
    .auth-brand { display: grid; gap: 5px; margin-bottom: 24px; }
    .auth-brand strong { font-size: 24px; letter-spacing: 0; }
    .auth-brand span { color: var(--muted); font-size: 14px; }
    .auth-form { display: grid; gap: 14px; }
    .auth-form label { min-width: 0; }
    .auth-form button { width: 100%; margin-top: 4px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 22px;
    }
    h1 { margin: 0; font-size: 28px; line-height: 1.1; letter-spacing: 0; }
    .subtle { color: var(--muted); font-size: 14px; }
    .grid { display: grid; gap: 16px; }
    .metrics { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .two { grid-template-columns: minmax(0, 1.2fr) minmax(320px, .8fr); }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(25, 44, 35, 0.05);
    }
    .metric span { display: block; color: var(--muted); font-size: 13px; margin-bottom: 8px; }
    .metric strong { font-size: 28px; letter-spacing: 0; }
    .section-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 12px; }
    .section-title h2 { margin: 0; font-size: 18px; }
    .table-wrap { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 12px 10px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    tr:last-child td { border-bottom: 0; }
    .pill { display: inline-flex; align-items: center; min-height: 26px; padding: 4px 9px; border-radius: 999px; background: #e8f3ee; color: #0f6048; font-weight: 700; font-size: 12px; }
    .button, button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      background: #fff;
      color: var(--ink);
      font-weight: 750;
      cursor: pointer;
      font-size: 14px;
    }
    .button.primary, button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .button.danger, button.danger { color: var(--danger); }
    .button:hover, button:hover { border-color: #b8c8bf; box-shadow: 0 2px 8px rgba(25, 44, 35, 0.08); }
    .button.primary:hover, button.primary:hover { background: #0c694d; border-color: #0c694d; }
    .filters, .form-grid { display: flex; flex-wrap: wrap; gap: 10px; align-items: end; }
    input, select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }
    label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; min-width: 210px; }
    input:focus, select:focus {
      outline: 3px solid rgba(15, 122, 90, 0.16);
      border-color: var(--accent);
    }
    .notice { padding: 12px 14px; border-radius: 8px; margin-bottom: 16px; font-weight: 650; }
    .notice.ok { background: #e8f3ee; color: #0f6048; }
    .notice.error { background: #fff1f0; color: var(--danger); }
    .error { padding: 12px 14px; border-radius: 8px; background: #fff1f0; color: var(--danger); font-weight: 700; }
    .auth-card .error { margin-bottom: 14px; }
    .bar-row { display: grid; gap: 8px; margin: 12px 0; }
    .bar-meta { display: flex; justify-content: space-between; gap: 12px; color: var(--muted); font-size: 13px; }
    .bar-track { height: 10px; background: #e8eeea; border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; min-width: 3px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
    .detail-list { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .detail-list div { padding: 12px; border: 1px solid var(--line); border-radius: 8px; background: #fbfdfc; }
    .detail-list span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .map-shell { display: grid; gap: 12px; }
    .map-canvas {
      width: 100%;
      height: 420px;
      border-radius: 12px;
      border: 1px solid var(--line);
      overflow: hidden;
      background: #eef4ef;
    }
    .map-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .map-legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar {
        position: sticky;
        top: 0;
        z-index: 10;
        padding: 14px 16px;
        gap: 12px;
      }
      .brand { padding: 0; }
      .brand strong { font-size: 19px; }
      .brand span { display: none; }
      .nav {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: none;
      }
      .nav::-webkit-scrollbar { display: none; }
      .nav a {
        flex: 0 0 auto;
        min-height: 36px;
        padding: 8px 11px;
      }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .two, .detail-list { grid-template-columns: 1fr; }
      .main { padding: 16px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .topbar .button, .topbar button { width: 100%; }
      .section-title { align-items: flex-start; flex-direction: column; }
      .filters, .form-grid { display: grid; grid-template-columns: 1fr; }
      .filters .button, .filters button, .form-grid .button, .form-grid button { width: 100%; }
      label { min-width: 0; }
      table { display: block; overflow-x: auto; white-space: nowrap; }
    }
    @media (max-width: 560px) {
      .auth-page { align-items: stretch; padding: 16px; }
      .auth-card { align-self: center; padding: 22px; }
      .main { padding: 14px; }
      h1 { font-size: 24px; }
      .metrics { grid-template-columns: 1fr; }
      .card { padding: 14px; }
      .metric strong { font-size: 24px; }
      .map-canvas { height: 320px; border-radius: 8px; }
      .bar-meta { align-items: flex-start; flex-direction: column; gap: 4px; }
    }
  </style>
</head>
<body>
  {% block body %}
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <strong>SafeRoute</strong>
        <span>System administration</span>
      </div>
      <nav class="nav">
        <a class="{% if active == 'dashboard' %}active{% endif %}" href="/dashboard">Overview</a>
        <a class="{% if active == 'users' %}active{% endif %}" href="/dashboard/users">Users</a>
        <a class="{% if active == 'routes' %}active{% endif %}" href="/dashboard/routes">Routes</a>
        <a class="{% if active == 'analytics' %}active{% endif %}" href="/dashboard/analytics">Analytics</a>
      </nav>
    </aside>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% endblock %}
  {% block extra_scripts %}{% endblock %}
</body>
</html>
