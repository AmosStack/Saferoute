services:
  - type: web
    name: saferoute-api
    runtime: python
    rootDir: backend
    buildCommand: "python -m pip install -r requirements.txt"
    startCommand: "gunicorn saferoute_api.wsgi:application --bind 0.0.0.0:$PORT"
    healthCheckPath: /health
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://saferoute-api.onrender.com"
      - key: DASHBOARD_USERNAME
        value: "admin"
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
